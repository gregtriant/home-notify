; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; htpiotps://docs.platformio.org/page/projectconf.html

[env:az-delivery-devkit-v4]
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino
; Display driver selection — uncomment ONE of the following:
build_flags = -D DISPLAY_WAVESHARE   ; Waveshare LCD1602 (lib/Waveshare_LCD1602)
; build_flags =                         ; LiquidCrystal_I2C (default, address 0x27)
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	; gregtriant/SocketClient@^1.3.2
	SocketClient=symlink://../SocketClient
	adafruit/Adafruit BME280 Library@^2.3.0
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	luisllamasbinaburo/I2CScanner@^1.0.1
	mathertel/OneButton@^2.6.1
	sstaub/Ticker@^4.4.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
